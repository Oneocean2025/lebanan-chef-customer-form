<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lebanan Chef Customer Details</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(218, 165, 32, 0.18), transparent 34%),
        linear-gradient(135deg, #020403, #071914 45%, #050505);
      color: #f8e8c0;
      padding: 0;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .container {
      width: 100%;
      max-width: 620px;
      background: rgba(4, 20, 16, 0.94);
      border: 1px solid rgba(218, 165, 32, 0.55);
      border-radius: 24px;
      padding: 18px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.55),
        inset 0 0 30px rgba(218, 165, 32, 0.06);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 11px;
      border: 1px solid rgba(218, 165, 32, 0.22);
      border-radius: 19px;
      pointer-events: none;
    }

    .arabic-pattern {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 235px;
      height: 235px;
      border: 2px solid rgba(218, 165, 32, 0.14);
      border-radius: 50%;
      background:
        repeating-conic-gradient(
          from 0deg,
          rgba(218, 165, 32, 0.10) 0deg 8deg,
          transparent 8deg 16deg
        );
      opacity: 0.65;
    }

    .header {
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .logo {
      width: 112px;
      height: 112px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #d9a441;
      box-shadow: 0 0 25px rgba(217, 164, 65, 0.35);
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      letter-spacing: 1.2px;
      color: #ffd98a;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .subtitle {
      margin-top: 5px;
      font-size: 14px;
      color: #f3d59a;
      letter-spacing: 0.8px;
    }

    .arabic-title {
      margin-top: 5px;
      font-size: 17px;
      color: #f9e7bd;
      direction: rtl;
    }

    form {
      position: relative;
      z-index: 1;
      margin-top: 12px;
    }

    label {
      display: block;
      margin-top: 9px;
      margin-bottom: 5px;
      color: #ffe6ad;
      font-weight: bold;
      letter-spacing: 0.3px;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(218, 165, 32, 0.45);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.07);
      color: #fff6df;
      font-size: 14px;
      outline: none;
      font-family: Arial, sans-serif;
      transition: 0.25s;
    }

    input::placeholder {
      color: rgba(255, 230, 173, 0.55);
    }

    input:focus {
      border-color: #ffd36b;
      box-shadow: 0 0 0 3px rgba(255, 211, 107, 0.14);
      background: rgba(255, 255, 255, 0.1);
    }

    .rating-title {
      margin-top: 13px;
      margin-bottom: 8px;
      color: #ffe6ad;
      font-weight: bold;
      letter-spacing: 0.3px;
      text-align: center;
      font-size: 14px;
    }

    .rating-scale {
      font-family: Arial, sans-serif;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(218, 165, 32, 0.36);
      border-radius: 18px;
      padding: 11px 10px 10px;
    }

    .faces {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      align-items: end;
    }

    .face-option {
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: 0.25s;
      opacity: 0.85;
    }

    .face-option:hover,
    .face-option.selected {
      transform: translateY(-5px) scale(1.05);
      opacity: 1;
    }

    .face-circle {
      width: 64px;
      height: 64px;
      margin: 0 auto 5px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 35px;
      border: 3px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: 0.25s;
    }

    .face-option.selected .face-circle {
      border-color: #fff4cf;
      box-shadow: 0 0 18px rgba(255, 218, 125, 0.55);
    }

    .face-red {
      background: #ef1f25;
    }

    .face-orange {
      background: #ef8d16;
    }

    .face-yellow {
      background: #ffc21d;
    }

    .face-lime {
      background: #bed63b;
    }

    .face-green {
      background: #75b843;
    }

    .face-label {
      font-size: 8.5px;
      font-weight: bold;
      color: #ffe6ad;
    }

    .rating-bar-wrap {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: #ffe6ad;
      font-size: 20px;
      font-weight: bold;
      line-height: 1;
    }

    .rating-bar {
      flex: 1;
      height: 14px;
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .bar-red { background: #ef1f25; }
    .bar-orange { background: #ef8d16; }
    .bar-yellow { background: #ffc21d; }
    .bar-lime { background: #bed63b; }
    .bar-green { background: #75b843; }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 17px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #b87820, #f5d27a, #b87820);
      color: #111;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1.5px;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
      transition: 0.25s;
      text-transform: uppercase;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(217, 164, 65, 0.28);
    }

    button:disabled {
      background: #777;
      cursor: not-allowed;
      transform: none;
    }

    .success,
    .error {
      display: none;
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
      position: relative;
      z-index: 1;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }

    .success {
      color: #8ff0a4;
    }

    .error {
      color: #ff9b9b;
    }

    .footer {
      margin-top: 13px;
      padding-top: 10px;
      border-top: 1px solid rgba(218, 165, 32, 0.25);
      text-align: center;
      color: #ffd98a;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.8px;
      position: relative;
      z-index: 1;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
    }

    @media (max-height: 760px) {
      .page {
        align-items: flex-start;
      }

      .container {
        padding: 14px;
      }

      .logo {
        width: 92px;
        height: 92px;
      }

      h1 {
        font-size: 22px;
      }

      .arabic-title {
        display: none;
      }

      .face-circle {
        width: 56px;
        height: 56px;
        font-size: 31px;
      }

      button {
        padding: 14px;
      }
    }

    @media (max-width: 430px) {
      .page {
        padding: 10px;
      }

      .container {
        padding: 14px;
        border-radius: 20px;
      }

      .logo {
        width: 96px;
        height: 96px;
      }

      h1 {
        font-size: 22px;
      }

      .subtitle {
        font-size: 13px;
      }

      .arabic-title {
        font-size: 15px;
      }

      input {
        padding: 9px 11px;
      }

      .faces {
        gap: 4px;
      }

      .face-circle {
        width: 52px;
        height: 52px;
        font-size: 29px;
      }

      .face-label {
        font-size: 7.5px;
      }
    }
  </style>
</head>

<body data-brand="Lebanan Chef">
  <div class="page">
    <div class="container">
      <div class="arabic-pattern"></div>

      <div class="header">
        <img src="lebanan-chef-logo.jpeg" alt="Lebanan Chef Logo" class="logo" />
        <h1>Lebanan Chef</h1>
        <div class="subtitle">Customer Details</div>
        <div class="arabic-title">تفاصيل العميل</div>
      </div>

      <form id="customerForm">
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter customer name" required />

        <label>Mobile Number</label>
        <input type="tel" id="mobile" placeholder="Enter mobile number" required />

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email address" required />

        <label>City</label>
        <input type="text" id="city" placeholder="Enter city" required />

        <div class="rating-title">How was your experience?</div>
        <input type="hidden" id="rating" required />

        <div class="rating-scale">
          <div class="faces">
            <div class="face-option" data-rating="Very Bad 😡">
              <div class="face-circle face-red">😡</div>
              <div class="face-label">Very Bad</div>
            </div>

            <div class="face-option" data-rating="Bad ☹️">
              <div class="face-circle face-orange">☹️</div>
              <div class="face-label">Bad</div>
            </div>

            <div class="face-option" data-rating="Average 😐">
              <div class="face-circle face-yellow">😐</div>
              <div class="face-label">Average</div>
            </div>

            <div class="face-option" data-rating="Good 🙂">
              <div class="face-circle face-lime">🙂</div>
              <div class="face-label">Good</div>
            </div>

            <div class="face-option" data-rating="Excellent 😀">
              <div class="face-circle face-green">😀</div>
              <div class="face-label">Excellent</div>
            </div>
          </div>

          <div class="rating-bar-wrap">
            <span>−</span>
            <div class="rating-bar">
              <div class="bar-red"></div>
              <div class="bar-orange"></div>
              <div class="bar-yellow"></div>
              <div class="bar-lime"></div>
              <div class="bar-green"></div>
            </div>
            <span>+</span>
          </div>
        </div>

        <button type="submit" id="submitBtn">SUBMIT</button>
      </form>

      <p class="success" id="successMessage">Customer details saved successfully!</p>
      <p class="error" id="errorMessage">Something went wrong. Please contact IT Department.</p>

      <div class="footer">
        Prepared by Lebanan Chef IT Department
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-j6xbDfdOMntd5zV6RHnDrgkNM63ZmbGi1ERq7JpUdr2ChxKdRpF8PeO6S9cWsIHB5w/exec";

    const form = document.getElementById("customerForm");
    const submitBtn = document.getElementById("submitBtn");
    const successMessage = document.getElementById("successMessage");
    const errorMessage = document.getElementById("errorMessage");
    const ratingInput = document.getElementById("rating");
    const faceOptions = document.querySelectorAll(".face-option");

    faceOptions.forEach(option => {
      option.addEventListener("click", function() {
        faceOptions.forEach(item => item.classList.remove("selected"));
        this.classList.add("selected");
        ratingInput.value = this.dataset.rating;
      });
    });

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      successMessage.style.display = "none";
      errorMessage.style.display = "none";

      if (!ratingInput.value) {
        errorMessage.textContent = "Please select a rating.";
        errorMessage.style.display = "block";
        return;
      }

      if (GOOGLE_SCRIPT_URL === "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE") {
        errorMessage.textContent = "Google Sheet connection is not ready. Please contact IT Department.";
        errorMessage.style.display = "block";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "SAVING...";

      const customer = {
        brand: document.body.dataset.brand,
        name: document.getElementById("name").value.trim(),
        mobile: document.getElementById("mobile").value.trim(),
        email: document.getElementById("email").value.trim(),
        city: document.getElementById("city").value.trim(),
        rating: ratingInput.value
      };

      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(customer)
      })
      .then(() => {
        form.reset();
        ratingInput.value = "";
        faceOptions.forEach(item => item.classList.remove("selected"));
        successMessage.style.display = "block";
      })
      .catch(() => {
        errorMessage.textContent = "Something went wrong. Please contact IT Department.";
        errorMessage.style.display = "block";
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = "SUBMIT";
      });
    });
  </script>
</body>
</html>
